apiVersion: apps/v1
kind: Deployment
metadata:
  name: vulnerable-agentic-ai-app
  labels:
    app: vulnerable-agentic-ai-app
    ssdlc-demo: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vulnerable-agentic-ai-app
  template:
    metadata:
      labels:
        app: vulnerable-agentic-ai-app
        ssdlc-demo: "true"
    spec:
      containers:
        - name: app
          image: vulnerable-agentic-ai-app:demo
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: APP_ENV
              value: demo
            - name: AGENT_DB
              value: /tmp/agent_memory.db
          securityContext:
            privileged: true
            allowPrivilegeEscalation: true
            runAsUser: 0
---
apiVersion: v1
kind: Service
metadata:
  name: vulnerable-agentic-ai-app
  labels:
    app: vulnerable-agentic-ai-app
spec:
  selector:
    app: vulnerable-agentic-ai-app
  ports:
    - name: http
      port: 80
      targetPort: 8080
