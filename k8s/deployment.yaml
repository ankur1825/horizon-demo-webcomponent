apiVersion: apps/v1
kind: Deployment
metadata:
  name: trustops-agent-vulnerable-demo
  labels:
    app: trustops-agent-vulnerable-demo
    ssdlc-demo: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trustops-agent-vulnerable-demo
  template:
    metadata:
      labels:
        app: trustops-agent-vulnerable-demo
        ssdlc-demo: "true"
    spec:
      containers:
        - name: app
          image: trustops-agent-vulnerable-demo:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: APP_ENV
              value: demo
            - name: TRUSTOPS_DB
              value: /tmp/trustops_agent.db
          securityContext:
            privileged: true
            allowPrivilegeEscalation: true
            runAsUser: 0
---
apiVersion: v1
kind: Service
metadata:
  name: trustops-agent-vulnerable-demo
  labels:
    app: trustops-agent-vulnerable-demo
spec:
  selector:
    app: trustops-agent-vulnerable-demo
  ports:
    - name: http
      port: 80
      targetPort: 8080
